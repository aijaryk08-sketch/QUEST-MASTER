<!DOCTYPE html>
<html lang="ky">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IT QUEST - Билим Жарышы</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Montserrat:wght@300;400;600;800&display=swap');
        
        :root {
            --primary: #3b82f6;
            --accent: #fbbf24;
            --bg: #020617;
        }

        body {
            font-family: 'Montserrat', sans-serif;
            background: var(--bg);
            color: white;
            overflow-x: hidden;
        }

        .cyber-card {
            background: rgba(15, 23, 42, 0.7);
            backdrop-filter: blur(16px);
            border: 1px solid rgba(59, 130, 246, 0.2);
            box-shadow: 0 10px 30px -10px rgba(0,0,0,0.5);
        }

        .active-player-glow {
            border: 2px solid var(--accent) !important;
            box-shadow: 0 0 20px rgba(251, 191, 36, 0.4);
        }

        .title-font { font-family: 'Orbitron', sans-serif; }

        .btn-gradient {
            background: linear-gradient(135deg, #3b82f6 0%, #1d4ed8 100%);
            transition: all 0.3s ease;
        }

        .correct-ans { background: #059669 !important; border-color: #34d399 !important; animation: pulse 0.4s ease; }
        .wrong-ans { background: #b91c1c !important; border-color: #f87171 !important; animation: shake 0.4s ease; }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-5px); }
            75% { transform: translateX(5px); }
        }
        @keyframes pulse {
            50% { transform: scale(1.05); }
        }

        .timer-low { color: #ff4757 !important; animation: blink 0.8s infinite; }
        @keyframes blink { 50% { opacity: 0.5; } }
    </style>
</head>

            </div>

                <input type="text" id="pName1" placeholder="1-оюнчунун аты" class="w-full p-4 rounded-xl bg-slate-900 border border-white/10 outline-none focus:border-blue-500 font-bold text-white">

            <button onclick="startGame()" class="w-full py-5 btn-gradient rounded-2xl font-black title-font text-lg uppercase tracking-widest">Баштоо</button>
        </div>
    </div>

    <!-- Game UI -->
    <div id="gameUI" class="hidden w-full max-w-7xl px-4 py-8">

            <div class="text-center md:text-left">
                <div class="flex items-center gap-3">
                    <span id="badgeLevel" class="bg-blue-600 text-[10px] px-2 py-1 rounded-md font-bold uppercase">SENIOR</span>
                    <h2 class="text-3xl font-black title-font">QUEST <span class="text-blue-500">PRO</span></h2>
                </div>
            </div>
            <div id="scoreboard" class="flex gap-4 overflow-x-auto pb-2"></div>
        </header>

        <div class="grid grid-cols-2 md:grid-cols-4 gap-4 mb-10">

            <div class="cyber-card p-5 rounded-2xl border-l-4 border-emerald-500">

        </div>

        <div id="subjectsGrid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-6"></div>
    </div>

    <!-- Question Modal -->

                <div id="qTimer" class="w-14 h-14 flex items-center justify-center rounded-xl border-2 border-blue-500 text-blue-400 font-black text-2xl">60</div>

            <div id="qOptions" class="grid grid-cols-1 md:grid-cols-2 gap-4"></div>
        </div>
    </div>

                {q: "Yesterday I ___ to school.", a: ["go", "went", "gone", "goes"], c: 1},
                {q: "She ___ breakfast every morning.", a: ["eat", "eats", "eating", "ate"], c: 1},

                {q: "How ___ you?", a: ["is", "are", "am", "do"], c: 1},
                {q: "The capital of UK?", a: ["New York", "London", "Paris", "Berlin"], c: 1},
                {q: "Monday, Tuesday, ___?", a: ["Friday", "Wednesday", "Sunday", "Thursday"], c: 1},
                {q: "Which one is a verb?", a: ["Happy", "Run", "Beautiful", "Quickly"], c: 1},
                {q: "A person from USA is...", a: ["English", "American", "British", "Russian"], c: 1},

                {q: "Can you help ___?", a: ["I", "me", "my", "mine"], c: 1},
                {q: "Twelve + Eight = ?", a: ["Eighteen", "Twenty", "Ten", "Fifteen"], c: 1},

                {q: "What time ___ it?", a: ["am", "is", "are", "do"], c: 1}
            ]},
            7: { name: "Логика", icon: "🧠", color: "from-purple-700 to-fuchsia-900", list: [
                {q: "7 уул бар, ар биринин бирден карындашы бар. Канча бала?", a: ["14", "8", "7", "15"], c: 1},
                {q: "Экинчи келе жатканды ашып өтсөңүз, канчанчы болосуз?", a: ["1", "2", "3", "4"], c: 1},
                {q: "А тамгасынан башталып Я менен бүткөн сөз?", a: ["Азбука", "Армия", "Акация", "Азия"], c: 1},
                {q: "Столдо 3 алма бар, 2ни алдыңыз. Сизде канча алма?", a: ["1", "2", "3", "0"], c: 1},
                {q: "Электр по поезди түштүккө баратат, түтүнү кайда?", a: ["Түндүк", "Түштүк", "Түтүн жок", "Батыш"], c: 2},
                {q: "Кайсы дөңгөлөк бурулганда айланбайт?", a: ["Оң", "Сол", "Запастагы", "Арткы"], c: 2},
                {q: "66 санын тескери кылса канчага чоңоёт?", a: ["33", "22", "99", "11"], c: 0},
                {q: "Канча айда 28 күн бар?", a: ["1", "2", "Бардыгында", "0"], c: 2},
                {q: "Шам, лампа, меш бар. Биринчи эмнени жагасыз?", a: ["Шам", "Меш", "Ширеңке", "Лампа"], c: 2},
                {q: "Күнү-түнү басат, бирок ордунан жылбайт?", a: ["Адам", "Саат", "Жол", "Дарыя"], c: 1},
                {q: "Эң оор: 1кг темирби же 1кг мактабы?", a: ["Темир", "Макта", "Бирдей", "Белгисиз"], c: 2},
                {q: "Бир үй-бүлөдө 2 ата, 2 уул бар. Жалпы канча киши?", a: ["4", "3", "2", "5"], c: 1},
                {q: "Кайсы идиштен тамак ичүүгө болбойт?", a: ["Бош", "Алтын", "Чоң", "Жалпак"], c: 0},
                {q: "Адам 10 күн уктабай кантип жашай алат?", a: ["Мүмкүн эмес", "Түнү уктайт", "Суу ичет", "Ал балык"], c: 1},
                {q: "Дарыянын эки жээгинде 2 адам турат. Экөө тең өттү. Кантип?", a: ["Башка жээктерде", "Сузуп", "Көпүрө", "Кайык"], c: 0},
                {q: "Эмне өйдө чыгат, бирок түшпөйт?", a: ["Топ", "Жаш", "Суу", "Адам"], c: 1},
                {q: "Кандай ташты суудан таппайсың?", a: ["Чоң", "Кургак", "Ысык", "Тегерек"], c: 1},
                {q: "Атасы менен баласы 5 партия шахмат ойноп, экөө тең 5тен утту. Кантип?", a: ["Башкалар менен", "Тең чыгуу", "Ката", "Бөлүштү"], c: 0},
                {q: "Төө куш өзүн кушмун дей алабы?", a: ["Ооба", "Жок", "Сүйлөбөйт", "Кээде"], c: 2},
                {q: "1ден 100гө чейин канча 9 цифрасы бар?", a: ["10", "11", "19", "20"], c: 3}
            ]}
        };

        let currentLevel = 'senior';
        let subjects = seniorData;
        let players = [];
        let currentPlayerIdx = 0;
        let subjectsProgress = {};
        let usedQuestions = {};
        const TIME_LIMIT = 60;
        let timerInterval;

        function setGameLevel(lvl) {
            currentLevel = lvl;
            subjects = lvl === 'junior' ? juniorData : seniorData;
            document.querySelectorAll('#lvlJunior, #lvlSenior').forEach(b => b.className = 'p-4 rounded-2xl border-2 border-slate-700 bg-slate-800/50 transition-all');
            document.getElementById(lvl === 'junior' ? 'lvlJunior' : 'lvlSenior').className = 'p-4 rounded-2xl border-2 border-blue-500 bg-blue-500/20 transition-all';
            document.getElementById('badgeLevel').innerText = lvl.toUpperCase();
        }

        function createPlayerInputs(n) {
            const container = document.getElementById('playerInputs');
            container.innerHTML = '';
            document.querySelectorAll('.p-btn').forEach((b, i) => b.className = (i+1 === n) ? 'p-btn w-12 h-12 rounded-xl bg-blue-600 border border-blue-500 font-black' : 'p-btn w-12 h-12 rounded-xl bg-slate-800 border border-white/10 font-black');
            for(let i=1; i<=n; i++) {
                container.innerHTML += `<input type="text" id="pName${i}" placeholder="${i}-оюнчунун аты" class="w-full p-4 rounded-xl bg-slate-900 border border-white/10 outline-none focus:border-blue-500 font-bold text-white mb-2">`;
            }
        }

        function startGame() {
            players = [];
            const inputs = document.querySelectorAll('#playerInputs input');
            inputs.forEach((inp, i) => players.push({ name: inp.value || `${i+1}-Оюнчу`, score: 0 }));
            for(let key in subjects) {
                subjectsProgress[key] = 0;
                usedQuestions[key] = [];
            }
            document.getElementById('setupScreen').classList.add('hidden');
            document.getElementById('gameUI').classList.remove('hidden');
            renderSubjects();
            updateDashboard();
        }

        function updateDashboard() {
            const board = document.getElementById('scoreboard');
            board.innerHTML = '';
            players.forEach((p, i) => {
                const isActive = i === currentPlayerIdx;
                board.innerHTML += `
                    <div class="cyber-card px-6 py-3 rounded-xl min-w-[140px] transition-all ${isActive ? 'active-player-glow' : 'opacity-60'}">
                        <p class="text-[10px] font-bold uppercase ${isActive ? 'text-blue-400' : 'text-gray-500'}">${p.name}</p>
                        <p class="text-xl font-black">${p.score} <span class="text-[10px] text-gray-500">УПАЙ</span></p>
                    </div>`;
            });
            document.getElementById('activePlayerName').innerText = players[currentPlayerIdx].name;
        }

        function renderSubjects() {
            const grid = document.getElementById('subjectsGrid');
            grid.innerHTML = '';
            for(let key in subjects) {
                const sub = subjects[key];
                const isDone = subjectsProgress[key] >= sub.list.length;
                grid.innerHTML += `
                    <button onclick="openQuestion(${key})" ${isDone ? 'disabled' : ''} 
                        class="p-6 rounded-[1.5rem] h-40 flex flex-col justify-between transition-all bg-gradient-to-br ${sub.color} ${isDone ? 'opacity-20 grayscale cursor-not-allowed' : 'hover:scale-105'}">
                        <span class="text-3xl">${sub.icon}</span>
                        <div class="text-left">
                            <p class="font-black text-lg leading-tight">${sub.name}</p>
                            <p class="text-[10px] opacity-70 uppercase font-bold">${subjectsProgress[key]} / ${sub.list.length}</p>
                        </div>
                    </button>`;
            }
        }

        function openQuestion(subId) {
            const sub = subjects[subId];
            const qIdx = subjectsProgress[subId];
            const q = sub.list[qIdx];
            
            document.getElementById('qCategory').innerText = sub.name;
            document.getElementById('qText').innerText = q.q;
            const options = document.getElementById('qOptions');
            options.innerHTML = '';
            q.a.forEach((opt, i) => {
                options.innerHTML += `<button onclick="checkAnswer(${subId}, ${i})" class="opt-btn p-5 rounded-2xl bg-white/5 border border-white/10 hover:bg-white/10 transition-all font-bold text-left">${opt}</button>`;
            });

            document.getElementById('questModal').classList.remove('hidden');
            startTimer(subId);
        }

        function startTimer(subId) {
            let timeLeft = TIME_LIMIT;
            const timerEl = document.getElementById('qTimer');
            const progress = document.getElementById('timerProgress');
            timerEl.innerText = timeLeft;
            progress.style.width = '100%';
            
            timerInterval = setInterval(() => {
                timeLeft--;
                timerEl.innerText = timeLeft;
                progress.style.width = (timeLeft/TIME_LIMIT*100) + '%';
                if(timeLeft <= 10) timerEl.classList.add('timer-low');
                if(timeLeft <= 0) {
                    clearInterval(timerInterval);
                    checkAnswer(subId, -1);
                }
            }, 1000);
        }

        function checkAnswer(subId, ansIdx) {
            clearInterval(timerInterval);
            const q = subjects[subId].list[subjectsProgress[subId]];
            const btns = document.querySelectorAll('.opt-btn');
            
            if(ansIdx === q.c) {
                players[currentPlayerIdx].score += 10;
                if(ansIdx !== -1) btns[ansIdx].classList.add('correct-ans');
            } else {
                if(ansIdx !== -1) btns[ansIdx].classList.add('wrong-ans');
                if(btns[q.c]) btns[q.c].classList.add('correct-ans');
            }

            setTimeout(() => {
                document.getElementById('questModal').classList.add('hidden');
                document.getElementById('qTimer').classList.remove('timer-low');
                subjectsProgress[subId]++;
                currentPlayerIdx = (currentPlayerIdx + 1) % players.length;
                
                updateDashboard();
                renderSubjects();
                checkGameOver();
            }, 1500);
        }

        function checkGameOver() {
            let totalRemaining = 0;
            for(let key in subjects) {
                totalRemaining += (subjects[key].list.length - subjectsProgress[key]);
            }
            if(totalRemaining === 0) {
                showResults();
            }
        }

        function showResults() {
            document.getElementById('resultModal').classList.remove('hidden');
            const rankings = document.getElementById('finalRankings');
            const sorted = [...players].sort((a,b) => b.score - a.score);
            rankings.innerHTML = sorted.map((p, i) => `
                <div class="cyber-card p-5 rounded-2xl flex justify-between items-center ${i === 0 ? 'border-yellow-500 border-2' : ''}">
                    <span class="font-black text-xl">${i+1}. ${p.name}</span>
                    <span class="text-2xl font-black text-blue-500">${p.score}</span>
                </div>`).join('');
        }

        window.onload = () => {
            setGameLevel('senior');
            createPlayerInputs(1);
        };
    </script>
